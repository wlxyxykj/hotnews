<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>热点聚合 · 实时榜单</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --surface3: #222d42;
      --border: #1e2d45;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-sub: #94a3b8;
      --gold: #f0b429;
      --silver: #94a3b8;
      --bronze: #cd7f32;
      --accent: #3b82f6;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      /* 平台颜色 */
      --weibo:    #ff7e5f;
      --tencent:  #07c160;
      --toutiao:  #e63946;
      --wangyi:   #cc0000;
      --sina:     #ff8800;
      --rmrb:     #dc2626;
      --cctv:     #1d4ed8;
      --xinhua:   #b91c1c;
      --pengpai:  #1e40af;
      --zhihu:    #0084ff;
      --bilibili: #fb7299;
      --c36kr:    #21a179;
      --huxiu:    #e63000;
      --ifanr:    #6366f1;
      --sspai:    #d97706;
      --ithome:   #0ea5e9;
      --github:   #6e7681;
      --douban:   #007722;
      --maoyan:   #ff3f3f;
      --weibo_ent: #ff5c8d;
      --sina_ent:  #f97316;
      --ifeng_ent: #8b5cf6;
      --caixin:   #b45309;
      --yicai:    #1e3a8a;
      --jiemian:  #0f766e;
      --wallstreet: #2563eb;
      --xueqiu:   #06b6d4;
      --guancha:  #dc2626;
      --huanqiu:  #7c3aed;
      --cankaoxiaoxi: #be185d;
      --hupu:     #e11d48;
      --dongqiudi: #16a34a;
      --cctv_sports: #1d4ed8;
    }

    html { font-size: 15px; scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59,130,246,.07) 0%, transparent 60%);
    }

    /* ════ HEADER ═══════════════════════════════════════════ */
    header {
      position: sticky; top: 0; z-index: 200;
      background: rgba(10,14,26,.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1440px; margin: 0 auto;
      display: flex; align-items: center; gap: 1rem;
      height: 56px; padding: 0 1.5rem;
    }
    .logo {
      display: flex; align-items: center; gap: .45rem;
      font-size: 1.05rem; font-weight: 700; letter-spacing: .03em;
      white-space: nowrap; flex-shrink: 0;
    }
    .logo-icon { font-size: 1.25rem; }

    /* ════ 分类 NAV ══════════════════════════════════════════ */
    .cat-nav {
      display: flex; align-items: center; gap: .25rem;
      overflow-x: auto; scrollbar-width: none; flex: 1;
    }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-btn {
      display: flex; align-items: center; gap: .3rem;
      padding: .3rem .75rem; border-radius: 999px;
      border: 1px solid transparent;
      background: transparent; color: var(--text-muted);
      font-size: .78rem; font-weight: 500; cursor: pointer;
      white-space: nowrap; transition: all .16s;
    }
    .cat-btn:hover { background: var(--surface2); color: var(--text); }
    .cat-btn.active {
      background: var(--surface2); color: var(--text);
      border-color: var(--accent); color: #93c5fd;
    }

    /* ════ 右侧工具栏 ════════════════════════════════════════ */
    .header-tools { display: flex; align-items: center; gap: .5rem; flex-shrink: 0; }

    .icon-btn {
      display: flex; align-items: center; gap: .3rem;
      padding: .3rem .65rem; border-radius: 7px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text-muted); font-size: .78rem; cursor: pointer;
      transition: all .16s; white-space: nowrap;
    }
    .icon-btn:hover { border-color: #60a5fa; color: var(--text); }
    .icon-btn.danger:hover { border-color: var(--red); color: var(--red); }
    .icon-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .icon-btn.primary:hover { background: #2563eb; }
    .icon-btn:disabled { opacity:.45; cursor:not-allowed; }
    .spin { display: inline-block; }
    .spin.spinning { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════ MODAL ═════════════════════════════════════════════ */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; animation: fadeIn .2s; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; width: 380px; max-width: calc(100vw - 2rem);
      padding: 1.6rem; box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .modal h3 { font-size: 1.05rem; margin-bottom: 1.1rem; }
    .modal-tabs { display: flex; gap: .5rem; margin-bottom: 1rem; }
    .modal-tab {
      flex: 1; padding: .45rem; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: .82rem; cursor: pointer; transition: all .15s;
    }
    .modal-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .modal input {
      width: 100%; padding: .55rem .75rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text); font-size: .88rem; margin-bottom: .65rem;
      outline: none; transition: border-color .15s;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-footer { display: flex; gap: .5rem; margin-top: .8rem; justify-content: flex-end; }
    .modal-err { color: var(--red); font-size: .78rem; margin: -.3rem 0 .5rem; min-height: 1em; }

    /* ════ USER MENU ═════════════════════════════════════════ */
    .user-menu-wrap { position: relative; }
    .user-dropdown {
      display: none; position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; min-width: 160px; padding: .4rem 0;
      box-shadow: 0 12px 40px rgba(0,0,0,.4); z-index: 300;
    }
    .user-dropdown.open { display: block; animation: fadeIn .15s; }
    .user-dropdown a, .user-dropdown button {
      display: block; width: 100%; text-align: left;
      padding: .5rem 1rem; font-size: .82rem; color: var(--text);
      background: none; border: none; cursor: pointer;
      text-decoration: none; transition: background .12s;
    }
    .user-dropdown a:hover, .user-dropdown button:hover { background: var(--surface2); }
    .user-dropdown .sep { border-top: 1px solid var(--border); margin: .3rem 0; }

    /* ════ MAIN ══════════════════════════════════════════════ */
    main { max-width: 1440px; margin: 0 auto; padding: 1.2rem 1.5rem 4rem; }

    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem; flex-wrap: wrap; gap: .4rem;
    }
    .status-bar-left { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
    .status-bar-right { font-size: .72rem; color: var(--text-muted); }

    /* 平台筛选 tabs（在综合视图内） */
    .plat-tabs {
      display: flex; align-items: center; gap: .25rem;
      flex-wrap: wrap; margin-bottom: 1rem;
    }
    .plat-tab {
      padding: .24rem .6rem; border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent; color: var(--text-muted);
      font-size: .74rem; cursor: pointer; transition: all .14s;
    }
    .plat-tab:hover { background: var(--surface2); color: var(--text); }
    .plat-tab.active { color: #fff; border-color: transparent; }

    /* ════ 网格布局 ══════════════════════════════════════════ */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1.1rem;
    }

    /* ════ 单个平台 CARD ══════════════════════════════════════ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 13px; overflow: hidden;
      transition: border-color .2s, transform .2s;
      display: flex; flex-direction: column;
    }
    .card:hover { border-color: rgba(96,165,250,.25); transform: translateY(-2px); }

    .card-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: .75rem 1rem .6rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .card-head-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 2.5px;
      border-radius: 13px 13px 0 0;
    }
    .card-title-wrap { display: flex; align-items: center; gap: .45rem; }
    .plat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .card-name { font-size: .88rem; font-weight: 600; }
    .card-head-right { display: flex; align-items: center; gap: .5rem; }
    .card-link {
      font-size: .7rem; color: var(--text-muted);
      text-decoration: none; transition: color .13s;
    }
    .card-link:hover { color: var(--text); }
    .update-badge {
      font-size: .66rem; padding: .14rem .44rem; border-radius: 999px;
      border: 1px solid; white-space: nowrap;
    }
    .update-badge.realtime { border-color: rgba(16,185,129,.4); color: #10b981; background: rgba(16,185,129,.08); }
    .update-badge.nonrt    { border-color: rgba(100,116,139,.3); color: var(--text-muted); background: transparent; }

    /* ════ 新闻列表 ══════════════════════════════════════════ */
    .news-list { list-style: none; flex: 1; }
    .news-item {
      display: flex; align-items: baseline; gap: .6rem;
      padding: .5rem 1rem;
      border-bottom: 1px solid rgba(30,45,69,.6);
      transition: background .13s;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item:hover { background: var(--surface2); }

    .rank { min-width: 20px; text-align: center; font-size: .75rem; font-weight: 700; color: var(--text-muted); flex-shrink: 0; }
    .rank.r1 { color: var(--gold); }
    .rank.r2 { color: var(--silver); }
    .rank.r3 { color: var(--bronze); }

    .news-link {
      flex: 1; font-size: .84rem; line-height: 1.55;
      color: var(--text); text-decoration: none; word-break: break-all;
      transition: color .13s;
    }
    .news-link:hover { color: #60a5fa; }

    .item-actions { display: flex; align-items: center; gap: .25rem; flex-shrink: 0; }
    .fav-btn {
      background: none; border: none; cursor: pointer;
      font-size: .85rem; color: var(--text-muted);
      padding: .1rem .2rem; border-radius: 4px;
      transition: color .13s; line-height: 1;
    }
    .fav-btn:hover { color: var(--gold); }
    .fav-btn.active { color: var(--gold); }

    .hot-tag { font-size: .68rem; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .hot-tag.hot1 { color: var(--gold); }
    .hot-tag.hot2 { color: var(--silver); }
    .hot-tag.hot3 { color: var(--bronze); }
    .hot-tag.green { color: var(--green); }

    /* ════ 骨架屏 ════════════════════════════════════════════ */
    .skeleton { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:.6; } 50% { opacity:.2; } }
    .skel-line {
      height: 13px; border-radius: 4px;
      background: var(--surface3); margin: .6rem 1rem;
    }
    .skel-line.w80 { width: 80%; }
    .skel-line.w65 { width: 65%; }
    .skel-line.w72 { width: 72%; }

    /* ════ 无数据 ════════════════════════════════════════════ */
    .empty-row {
      padding: 1.8rem 1rem; text-align: center;
      color: var(--text-muted); font-size: .82rem;
      display: flex; flex-direction: column; align-items: center; gap: .4rem;
    }
    .empty-row .emo { font-size: 1.4rem; }

    /* ════ 侧栏（收藏/历史）════════════════════════════════ */
    .drawer-overlay {
      display: none; position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,.5); backdrop-filter: blur(3px);
    }
    .drawer-overlay.open { display: block; animation: fadeIn .2s; }
    .drawer {
      position: fixed; top: 0; right: -400px; bottom: 0; z-index: 401;
      width: 360px; max-width: 94vw;
      background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: right .28s cubic-bezier(.4,0,.2,1);
    }
    .drawer.open { right: 0; }
    .drawer-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.2rem; border-bottom: 1px solid var(--border);
    }
    .drawer-head h3 { font-size: .95rem; }
    .drawer-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; }
    .drawer-tabs { display: flex; gap: .5rem; padding: .75rem 1rem .5rem; border-bottom: 1px solid var(--border); }
    .drawer-tab {
      flex: 1; padding: .38rem; border-radius: 7px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: .78rem; cursor: pointer; transition: all .14s;
    }
    .drawer-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .drawer-body { flex: 1; overflow-y: auto; padding: .5rem 0; }
    .drawer-item {
      padding: .55rem 1.2rem; border-bottom: 1px solid rgba(30,45,69,.5);
      transition: background .12s;
    }
    .drawer-item:hover { background: var(--surface2); }
    .drawer-item a {
      font-size: .82rem; color: var(--text); text-decoration: none;
      display: block; line-height: 1.5; word-break: break-all;
    }
    .drawer-item a:hover { color: #60a5fa; }
    .drawer-item .di-meta { font-size: .68rem; color: var(--text-muted); margin-top: .2rem; display: flex; gap: .5rem; align-items: center; }
    .drawer-item .di-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: .75rem; }
    .drawer-item .di-del:hover { color: var(--red); }
    .drawer-footer { padding: .75rem 1.2rem; border-top: 1px solid var(--border); }
    .drawer-empty { padding: 2rem 1rem; text-align: center; color: var(--text-muted); font-size: .82rem; }

    /* ════ 全屏单平台视图 ════════════════════════════════════ */
    .full-view { display: none; }
    .full-view.active { display: block; animation: fadeIn .22s; }
    .full-view .news-item { padding: .58rem 1.4rem; }

    /* ════ Toast ════════════════════════════════════════════ */
    #toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: var(--surface3); border: 1px solid var(--border);
      color: var(--text); font-size: .82rem; padding: .55rem 1.2rem;
      border-radius: 999px; z-index: 600;
      opacity: 0; transition: opacity .25s; pointer-events: none;
    }
    #toast.show { opacity: 1; }

    @keyframes fadeIn { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform:translateY(0); } }

    /* ════ 失败平台折叠区 ═══════════════════════════════════════ */
    .failed-section {
      margin-top: 1.5rem;
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 13px;
      overflow: hidden;
      background: rgba(239,68,68,.03);
    }
    .failed-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: .7rem 1.1rem;
      cursor: pointer; user-select: none;
      font-size: .8rem; color: var(--text-muted);
      transition: background .15s;
    }
    .failed-toggle:hover { background: rgba(239,68,68,.06); }
    .failed-toggle-left { display: flex; align-items: center; gap: .5rem; }
    .failed-toggle-left .emo { font-size: 1rem; }
    .failed-badge {
      background: rgba(239,68,68,.15); color: #f87171;
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 999px; padding: .1rem .55rem;
      font-size: .72rem;
    }
    .failed-arrow { transition: transform .2s; font-size: .75rem; }
    .failed-arrow.open { transform: rotate(180deg); }
    .failed-body {
      display: none;
      border-top: 1px solid rgba(239,68,68,.15);
      padding: .5rem;
    }
    .failed-body.open { display: block; }
    .failed-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: .5rem;
    }
    .failed-card {
      background: var(--surface);
      border: 1px solid rgba(239,68,68,.15);
      border-radius: 8px;
      padding: .6rem .8rem;
      display: flex; flex-direction: column; gap: .3rem;
    }
    .failed-card-name {
      display: flex; align-items: center; gap: .35rem;
      font-size: .8rem; font-weight: 600;
    }
    .failed-dot { width: 6px; height: 6px; border-radius: 50%; background: #f87171; }
    .failed-card-note {
      font-size: .68rem; color: var(--text-muted);
      padding-left: .9rem;
    }

    /* ════ 访客统计 ════════════════════════════════════════════════ */
    .stats-bar {
      margin-top: 1.5rem;
      padding: .6rem 1rem;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      gap: 1.2rem; font-size: .76rem; color: var(--text-muted);
    }
    .stats-bar span { display: flex; align-items: center; gap: .3rem; }

    @media (max-width: 640px) {
      .header-inner { padding: 0 .8rem; }
      main { padding: .8rem .8rem 4rem; }
      .news-grid { grid-template-columns: 1fr; }
      .logo span { display: none; }
    }
  </style>
  <!-- 不蒜子统计 -->
  <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</head>
<body>

<!-- ════ HEADER ═══════════════════════════════════════════ -->
<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">🔥</span>
      <span>热点聚合</span>
    </div>

    <!-- 分类导航 -->
    <nav class="cat-nav" id="catNav">
      <button class="cat-btn active" data-cat="综合">🌐 综合</button>
      <button class="cat-btn" data-cat="科技">💻 科技</button>
      <button class="cat-btn" data-cat="娱乐">🎬 娱乐</button>
      <button class="cat-btn" data-cat="财经">📈 财经</button>
      <button class="cat-btn" data-cat="军事国际">🌍 军事国际</button>
      <button class="cat-btn" data-cat="体育">⚽ 体育</button>
    </nav>

    <div class="header-tools">
      <button class="icon-btn" id="refreshBtn" onclick="refreshCurrent()">
        <span class="spin" id="spinIcon">↻</span> 刷新
      </button>
      <!-- 未登录 -->
      <button class="icon-btn primary" id="loginBtn" onclick="openAuthModal()">登录</button>
      <!-- 已登录 -->
      <div class="user-menu-wrap" id="userMenu" style="display:none">
        <button class="icon-btn" id="userNameBtn" onclick="toggleUserMenu()">👤 <span id="userNameText"></span> ▾</button>
        <div class="user-dropdown" id="userDropdown">
          <a href="#" onclick="openDrawer('fav');return false">⭐ 我的收藏</a>
          <a href="#" onclick="openDrawer('history');return false">🕒 浏览记录</a>
          <div class="sep"></div>
          <button onclick="logout()">退出登录</button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ════ MAIN ═════════════════════════════════════════════ -->
<main>
  <div class="status-bar">
    <div class="status-bar-left">
      <!-- 平台 tabs（动态生成） -->
      <div class="plat-tabs" id="platTabs"></div>
    </div>
    <div class="status-bar-right" id="updateTime">正在加载...</div>
  </div>

  <!-- 网格容器 -->
  <div class="news-grid" id="newsGrid"></div>

  <!-- 全屏单平台视图 -->
  <div class="full-view" id="fullView">
    <div class="card" id="fullCard" style="max-width:700px;margin:0 auto"></div>
  </div>

  <!-- 失败平台折叠区 -->
  <div id="failedSection" class="failed-section" style="display:none">
    <div class="failed-toggle" onclick="toggleFailed()">
      <div class="failed-toggle-left">
        <span class="emo">⚠️</span>
        <span id="failedLabel">以下平台暂时无法抓取（点击展开）</span>
        <span class="failed-badge" id="failedBadge">0</span>
      </div>
      <span class="failed-arrow" id="failedArrow">▼</span>
    </div>
    <div class="failed-body" id="failedBody">
      <div class="failed-grid" id="failedGrid"></div>
    </div>
  </div>

  <!-- 访客统计 -->
  <div class="stats-bar">
    <span>👁️ 访问 <span id="busuanzi_value_site_pv"></span> 次</span>
    <span>👤 访客 <span id="busuanzi_value_site_uv"></span> 人</span>
  </div>
</main>

// ════════════════════════════════════════════════════════════
// 状态
// ════════════════════════════════════════════════════════════
let currentCat = "综合";
let currentPlat = null;     // null = 显示整个分类网格
let newsCache = {};         // { platformId: { items, is_realtime, fetched_at, update_note } }
let failedPlatforms = [];   // 当前分类失败的平台列表
let loading = false;
let authToken = localStorage.getItem("hn_token") || "";
let authUser  = JSON.parse(localStorage.getItem("hn_user") || "null");
let authMode  = "login";
let favIds    = new Set();    // 已收藏 URL 集合（本地标记）

// ════════════════════════════════════════════════════════════
// 工具
// ════════════════════════════════════════════════════════════
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function rankCls(n) {
  if (n===1) return "rank r1"; if (n===2) return "rank r2"; if (n===3) return "rank r3";
  return "rank";
}
function hotCls(h) {
  if (!h) return "hot-tag";
  if (h==="沸"||h==="爆") return "hot-tag hot1";
  if (h==="热") return "hot-tag hot2";
  if (h.includes("万")) return "hot-tag hot2";
  return "hot-tag";
}
function showToast(msg, dur=2000) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), dur);
}

// ════════════════════════════════════════════════════════════
// 认证 UI
// ════════════════════════════════════════════════════════════
function updateAuthUI() {
  if (authUser) {
    document.getElementById("loginBtn").style.display = "none";
    document.getElementById("userMenu").style.display = "block";
    document.getElementById("userNameText").textContent = authUser.username;
    loadFavIds();
  } else {
    document.getElementById("loginBtn").style.display = "block";
    document.getElementById("userMenu").style.display = "none";
    favIds.clear();
    refreshFavBtns();
  }
}

function openAuthModal() {
  document.getElementById("authModal").classList.add("open");
  document.getElementById("authUsername").focus();
  document.getElementById("authErr").textContent = "";
}
function closeAuthModal() {
  document.getElementById("authModal").classList.remove("open");
}
function closeModalOnBg(e) {
  if (e.target.id === "authModal") closeAuthModal();
}
function switchAuthTab(mode) {
  authMode = mode;
  document.querySelectorAll(".modal-tab").forEach((el,i) => {
    el.classList.toggle("active", (i===0 && mode==="login") || (i===1 && mode==="register"));
  });
  document.getElementById("authSubmitBtn").textContent = mode === "login" ? "登录" : "注册";
  document.getElementById("authErr").textContent = "";
}
async function submitAuth() {
  const username = document.getElementById("authUsername").value.trim();
  const password = document.getElementById("authPassword").value;
  const errEl = document.getElementById("authErr");
  if (!username || !password) { errEl.textContent = "请填写完整"; return; }
  const btn = document.getElementById("authSubmitBtn");
  btn.disabled = true;
  try {
    const resp = await fetch(`/api/auth/${authMode}`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json();
    if (!resp.ok) { errEl.textContent = data.error || "操作失败"; return; }
    authToken = data.token;
    authUser  = { username: data.username, user_id: data.user_id };
    localStorage.setItem("hn_token", authToken);
    localStorage.setItem("hn_user", JSON.stringify(authUser));
    closeAuthModal();
    updateAuthUI();
    showToast("🎉 " + (authMode==="login" ? "登录成功" : "注册成功"));
  } catch(e) {
    errEl.textContent = "网络错误，请重试";
  } finally {
    btn.disabled = false;
  }
}
function logout() {
  authToken = ""; authUser = null;
  localStorage.removeItem("hn_token"); localStorage.removeItem("hn_user");
  userMenuOpen = false;
  document.getElementById("userDropdown").classList.remove("open");
  updateAuthUI();
  showToast("已退出登录");
}
function toggleUserMenu() {
  userMenuOpen = !userMenuOpen;
  document.getElementById("userDropdown").classList.toggle("open", userMenuOpen);
}
document.addEventListener("click", e => {
  if (!e.target.closest(".user-menu-wrap")) {
    userMenuOpen = false;
    const d = document.getElementById("userDropdown");
    if (d) d.classList.remove("open");
  }
});

// ════════════════════════════════════════════════════════════
// 收藏
// ════════════════════════════════════════════════════════════
async function loadFavIds() {
  if (!authUser) return;
  try {
    const resp = await fetch("/api/favorites", {
      headers: {"Authorization": "Bearer " + authToken}
    });
    if (!resp.ok) return;
    const data = await resp.json();
    favIds = new Set(data.map(f => f.url));
    refreshFavBtns();
  } catch(e) {}
}
function refreshFavBtns() {
  document.querySelectorAll(".fav-btn").forEach(btn => {
    const url = btn.dataset.url;
    btn.classList.toggle("active", favIds.has(url));
    btn.title = favIds.has(url) ? "取消收藏" : "收藏";
  });
}
async function toggleFav(btn) {
  if (!authUser) { openAuthModal(); return; }
  const url   = btn.dataset.url;
  const title = btn.dataset.title;
  const platform = btn.dataset.platform;
  const isFav = favIds.has(url);
  if (isFav) {
    // 找 id 删除
    try {
      const resp = await fetch("/api/favorites", {
        headers: {"Authorization": "Bearer " + authToken}
      });
      const data = await resp.json();
      const fav = data.find(f => f.url === url);
      if (fav) {
        await fetch("/api/favorites/" + fav.id, {
          method: "DELETE",
          headers: {"Authorization": "Bearer " + authToken}
        });
      }
      favIds.delete(url);
      showToast("已取消收藏");
    } catch(e) { showToast("操作失败"); }
  } else {
    try {
      await fetch("/api/favorites", {
        method: "POST",
        headers: {"Authorization":"Bearer "+authToken, "Content-Type":"application/json"},
        body: JSON.stringify({ title, url, platform })
      });
      favIds.add(url);
      showToast("⭐ 已收藏");
    } catch(e) { showToast("操作失败"); }
  }
  refreshFavBtns();
}

// 记录浏览历史
async function trackHistory(title, url, platform) {
  if (!authUser) return;
  try {
    await fetch("/api/history", {
      method: "POST",
      headers: {"Authorization":"Bearer "+authToken, "Content-Type":"application/json"},
      body: JSON.stringify({ title, url, platform })
    });
  } catch(e) {}
}

// ════════════════════════════════════════════════════════════
// 侧栏抽屉
// ════════════════════════════════════════════════════════════
function openDrawer(mode) {
  drawerMode = mode;
  userMenuOpen = false;
  document.getElementById("userDropdown").classList.remove("open");
  document.getElementById("drawerOverlay").classList.add("open");
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerTabBar").style.display = "flex";
  loadDrawerContent();
}
function closeDrawer() {
  document.getElementById("drawerOverlay").classList.remove("open");
  document.getElementById("drawer").classList.remove("open");
}
function switchDrawerTab(mode) {
  drawerMode = mode;
  document.querySelectorAll(".drawer-tab").forEach((el, i) => {
    el.classList.toggle("active", (i===0&&mode==="fav")||(i===1&&mode==="history"));
  });
  loadDrawerContent();
}
async function loadDrawerContent() {
  const body = document.getElementById("drawerBody");
  const footer = document.getElementById("drawerFooter");
  const title = document.getElementById("drawerTitle");
  title.textContent = drawerMode === "fav" ? "⭐ 我的收藏" : "🕒 浏览记录";
  body.innerHTML = `<div class="drawer-empty">加载中...</div>`;
  footer.innerHTML = "";
  if (!authUser) {
    body.innerHTML = `<div class="drawer-empty">请先登录</div>`; return;
  }
  try {
    const endpoint = drawerMode === "fav" ? "/api/favorites" : "/api/history";
    const resp = await fetch(endpoint, { headers: {"Authorization":"Bearer "+authToken} });
    if (!resp.ok) { body.innerHTML = `<div class="drawer-empty">加载失败</div>`; return; }
    const data = await resp.json();
    if (!data.length) {
      body.innerHTML = `<div class="drawer-empty">${drawerMode==="fav"?"暂无收藏":"暂无浏览记录"}</div>`;
      return;
    }
    body.innerHTML = data.map(item => {
      const meta = drawerMode === "fav" ? item.saved_at : item.viewed_at;
      const delAttr = drawerMode === "fav"
        ? `onclick="delFav(${item.id}, this)"` : "";
      return `<div class="drawer-item">
        <a href="${esc(item.url)}" target="_blank" rel="noopener"
           onclick="trackHistory('${esc(item.title)}','${esc(item.url)}','${esc(item.platform||'')}')"
        >${esc(item.title)}</a>
        <div class="di-meta">
          <span>${item.platform || ""}</span>
          <span>${(meta||"").slice(0,16)}</span>
          ${drawerMode==="fav" ? `<button class="di-del" ${delAttr}>🗑</button>` : ""}
        </div>
      </div>`;
    }).join("");

    if (drawerMode === "history") {
      footer.innerHTML = `<button class="icon-btn danger" style="width:100%" onclick="clearHistory()">🗑 清空历史</button>`;
    }
  } catch(e) {
    body.innerHTML = `<div class="drawer-empty">加载出错</div>`;
  }
}
async function delFav(id, btn) {
  try {
    await fetch("/api/favorites/" + id, {
      method: "DELETE",
      headers: {"Authorization":"Bearer "+authToken}
    });
    btn.closest(".drawer-item").remove();
    await loadFavIds();
    showToast("已删除");
  } catch(e) { showToast("删除失败"); }
}
async function clearHistory() {
  if (!confirm("确认清空全部浏览记录？")) return;
  try {
    await fetch("/api/history", {
      method: "DELETE",
      headers: {"Authorization":"Bearer "+authToken}
    });
    loadDrawerContent();
    showToast("已清空");
  } catch(e) { showToast("操作失败"); }
}

// ════════════════════════════════════════════════════════════
// 分类 & 平台切换
// ════════════════════════════════════════════════════════════
document.getElementById("catNav").addEventListener("click", e => {
  const btn = e.target.closest(".cat-btn");
  if (!btn) return;
  const cat = btn.dataset.cat;
  if (cat === currentCat && currentPlat === null) return;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentCat = cat;
  currentPlat = null;
  renderPlatTabs();
  refreshCurrent();
});

function renderPlatTabs() {
  const container = document.getElementById("platTabs");
  const plats = CATEGORIES[currentCat] || [];
  const html = `<button class="plat-tab active" data-plat="all" onclick="selectPlat(null,this)">全部</button>` +
    plats.map(pid => {
      const m = PLATFORM_META[pid] || {};
      return `<button class="plat-tab" data-plat="${pid}"
        style="--pc:${m.color||'#60a5fa'}"
        onclick="selectPlat('${pid}',this)"
      >${m.emoji||""} ${m.label||pid}</button>`;
    }).join("");
  container.innerHTML = html;
  // 给 active 的着色
  applyPlatTabColors();
}

function applyPlatTabColors() {
  document.querySelectorAll(".plat-tab.active").forEach(btn => {
    const pid = btn.dataset.plat;
    if (pid === "all") {
      btn.style.background = "var(--accent)";
      btn.style.borderColor = "var(--accent)";
      btn.style.color = "#fff";
    } else {
      const m = PLATFORM_META[pid] || {};
      btn.style.background = m.color || "var(--accent)";
      btn.style.borderColor = m.color || "var(--accent)";
      btn.style.color = "#fff";
    }
  });
}

function selectPlat(pid, btn) {
  document.querySelectorAll(".plat-tab").forEach(b => {
    b.classList.remove("active");
    b.style.background = ""; b.style.borderColor = ""; b.style.color = "";
  });
  btn.classList.add("active");
  applyPlatTabColors();
  currentPlat = pid;
  renderView();
}

// ════════════════════════════════════════════════════════════
// 渲染
// ════════════════════════════════════════════════════════════
function skeletonCard() {
  return `<div class="skel-line w80 skeleton"></div>
          <div class="skel-line w65 skeleton"></div>
          <div class="skel-line w72 skeleton"></div>
          <div class="skel-line w80 skeleton"></div>
          <div class="skel-line w65 skeleton"></div>`;
}

function renderNewsItem(item, platformId) {
  const isFav = favIds.has(item.url);
  return `<li class="news-item">
    <span class="${rankCls(item.rank)}">${item.rank}</span>
    <a class="news-link" href="${esc(item.url)}" target="_blank" rel="noopener"
       onclick="trackHistory('${esc(item.title).replace(/'/g,"&#39;")}','${esc(item.url)}','${platformId}')"
    >${esc(item.title)}</a>
    <div class="item-actions">
      ${item.hot ? `<span class="${hotCls(item.hot)}">${esc(item.hot)}</span>` : ""}
      <button class="fav-btn${isFav?" active":""}"
        data-url="${esc(item.url)}"
        data-title="${esc(item.title).replace(/"/g,"&quot;")}"
        data-platform="${platformId}"
        title="${isFav?"取消收藏":"收藏"}"
        onclick="toggleFav(this)"
      >${isFav?"⭐":"☆"}</button>
    </div>
  </li>`;
}

function renderCard(platformId, data, preview=true) {
  const m = PLATFORM_META[platformId] || { label: platformId, color: "#60a5fa", home: "#" };
  const maxItems = preview ? 10 : 25;
  const isFailed = data?.status === "failed" || !data?.items?.length;

  const badge = data
    ? (isFailed
        ? `<span class="update-badge" style="border-color:rgba(239,68,68,.4);color:#f87171;background:rgba(239,68,68,.08)">❌ 不可用</span>`
        : (data.is_realtime
            ? `<span class="update-badge realtime">⚡ 实时</span>`
            : `<span class="update-badge nonrt" title="${esc(data.update_note||'')}">🕒 ${esc(data.update_note||"非实时")}</span>`))
    : "";

  const fetchedAt = data?.fetched_at ? `更新 ${data.fetched_at}` : "";

  let body = "";
  if (!data) {
    body = skeletonCard();
  } else if (isFailed) {
    body = `<div class="empty-row"><span class="emo">😅</span><span>${esc(data.update_note || "抓取失败")}</span></div>`;
  } else {
    body = `<ul class="news-list">${data.items.slice(0, maxItems).map(it => renderNewsItem(it, platformId)).join("")}</ul>`;
  }

  return `<div class="card-head" style="--accent:${m.color}${isFailed ? ";opacity:.6" : ""}">
    <div class="card-head-bar" style="background:${isFailed ? "#6b7280" : m.color}"></div>
    <div class="card-title-wrap">
      <span class="plat-dot" style="background:${isFailed ? "#6b7280" : m.color};box-shadow:0 0 5px ${isFailed ? "#6b7280" : m.color}"></span>
      <span class="card-name">${m.emoji||""} ${m.label}</span>
      ${badge}
    </div>
    <div class="card-head-right">
      <span style="font-size:.66rem;color:var(--text-muted)">${fetchedAt}</span>
      <a class="card-link" href="${m.home}" target="_blank" rel="noopener">官网 ↗</a>
    </div>
  </div>
  ${body}`;
}

function renderView() {
  const grid = document.getElementById("newsGrid");
  const full = document.getElementById("fullView");
  const plats = CATEGORIES[currentCat] || [];

  if (!currentPlat) {
    // 网格视图
    grid.style.display = "grid";
    full.classList.remove("active");
    grid.innerHTML = plats.map(pid => {
      const data = newsCache[pid];
      return `<div class="card" id="card-${pid}">${renderCard(pid, data, true)}</div>`;
    }).join("");
  } else {
    // 单平台全屏
    grid.style.display = "none";
    full.classList.add("active");
    const data = newsCache[currentPlat];
    document.getElementById("fullCard").innerHTML = renderCard(currentPlat, data, false);
  }
  refreshFavBtns();
  renderFailedSection();
}

// ════ 失败平台折叠区 ══════════════════════════════════════
function toggleFailed() {
  const body  = document.getElementById("failedBody");
  const arrow = document.getElementById("failedArrow");
  const open  = body.classList.toggle("open");
  arrow.classList.toggle("open", open);
}

function renderFailedSection() {
  const section = document.getElementById("failedSection");
  const badge   = document.getElementById("failedBadge");
  const label   = document.getElementById("failedLabel");
  const grid    = document.getElementById("failedGrid");

  if (!failedPlatforms || failedPlatforms.length === 0) {
    section.style.display = "none";
    return;
  }

  badge.textContent = failedPlatforms.length;
  label.textContent = `以下 ${failedPlatforms.length} 个平台暂时无法抓取（点击展开）`;
  section.style.display = "block";

  grid.innerHTML = failedPlatforms.map(fp => {
    const m = PLATFORM_META[fp.platform] || {};
    return `<div class="failed-card">
      <div class="failed-card-name">
        <span class="failed-dot"></span>
        <span>${m.emoji||""} ${fp.name}</span>
      </div>
      <div class="failed-card-note">${esc(fp.note || "抓取失败")}</div>
    </div>`;
  }).join("");
}

// ════════════════════════════════════════════════════════════
// 数据加载
// ════════════════════════════════════════════════════════════
async function refreshCurrent() {
  if (loading) return;
  loading = true;
  const btn = document.getElementById("refreshBtn");
  const spin = document.getElementById("spinIcon");
  btn.disabled = true; spin.classList.add("spinning");
  document.getElementById("updateTime").textContent = "正在加载...";

  // 先渲染骨架
  renderView();

  const plats = currentPlat ? [currentPlat] : (CATEGORIES[currentCat] || []);

  try {
    const ids = plats.join(",");
    const resp = await fetch(`/api/news/batch?platforms=${ids}`);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();

    // 分离数据与元信息
    const meta = data._meta || {};
    failedPlatforms = meta.failed || [];

    // 只保留数据部分
    const { _meta: _, ...cleanData } = data;
    Object.assign(newsCache, cleanData);
  } catch(e) {
    console.error("加载失败:", e);
    document.getElementById("updateTime").textContent = "⚠ 加载失败";
  } finally {
    renderView();
    const now = new Date();
    document.getElementById("updateTime").textContent =
      `最后刷新：${now.toLocaleTimeString("zh-CN",{hour12:false})}`;
    loading = false;
    btn.disabled = false; spin.classList.remove("spinning");
  }
}

// ════════════════════════════════════════════════════════════
// Keep-alive（每 4.5 分钟 ping 一次，防 Render 休眠）
// ════════════════════════════════════════════════════════════
setInterval(() => {
  fetch("/api/ping").catch(()=>{});
}, 4.5 * 60 * 1000);

// 自动刷新（5分钟）
setInterval(() => {
  if (!loading) refreshCurrent();
}, 5 * 60 * 1000);

// ════════════════════════════════════════════════════════════
// 初始化
// ════════════════════════════════════════════════════════════
(function init() {
  updateAuthUI();
  renderPlatTabs();
  refreshCurrent();
})();
</script>
</body>
</html>
