# Render 部署配置 - 热点聚合 v2.0
services:
  - type: web
    name: hotnews
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60
    healthCheckPath: /api/ping
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "10000"
      - key: CACHE_TTL
        value: "180"
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: "/tmp/hotnews.db"
